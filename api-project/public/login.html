<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in – UK Housing API</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 400px; margin: 3rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 0.75rem; }
    input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
    .error { color: #c00; margin-top: 0.5rem; }
    a { color: #0066cc; }
  </style>
</head>
<body>
  <h1>Log in</h1>
  <p><a href="/">Home</a> · <a href="/register.html">Register</a></p>
  <form method="post" action="/auth/login">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required autocomplete="current-password">
    <button type="submit">Log in</button>
  </form>
  <p id="message" class="error"></p>
  <p id="error" class="error"></p>
  <script>
    var params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'invalid') document.getElementById('error').textContent = 'Invalid email or password.';
    if (params.get('registered') === '1') document.getElementById('message').innerHTML = 'Account created. Log in to get your API key.';
  </script>
</body>
</html>
